<!DOCTYPE html>
<html lang="">
    <head>
        <title>Feeder</title>
        <script src="/js/index.js"></script>
        <link rel="stylesheet" href="/style/index.css">
    </head>
    <body>
        <div class="container">
            <header class="screen_header">
                <h1 class="main"><a href="/">Feeder</a></h1>
                <hr />
                <hr />
                <div class="sub">
                    <button onclick="showSection('#search_feed_container')">Search</button>
                    <button onclick="showSection('#question_container')">Ask a Question</button>
                    <button onclick="showSection('#add_feed_container')">Add Feeds</button>
                    <button onclick="showSection('#list_feeds_container')">List Feeds</button>
                </div>
            </header>
            <div id="add_feed_container" class="section">
                <article id="feed_add">
                    <h2>Add Feeds</h2>
                    <p><label for="feed-input">Feed</label></p>
                    <textarea id="feed-input" rows="10" cols="80"></textarea>
                    <p><button id="feed-add-button">Add Feeds</button></p>
                    <p><label for="progress" style="font-weight: bold">Progress:</label>&nbsp;<span id="progress"></span></p>
                    <ul id="feed_add_output"></ul>
                </article>
            </div>
            <div id="list_feeds_container" class="section">
                <article id="feed_list">
                    <h2>All Feeds</h2>
                    <ul id="feed_list_output"></ul>
                </article>
            </div>
            <div id="search_feed_container" class="section">
                <article id="feed_search">
                    <h2>Search Feeds</h2>
                    <p><label for="search-input">Search</label></p>
                    <textarea id="search-input" rows="10" cols="80"></textarea>
                    <p><button id="search-button" onclick="search()">Search</button></p>
                    <ul id="feed_search_output"></ul>
                </article>
            </div>
            <div id="question_container" class="section">
                <article id="question">
                    <h2>Ask a Question</h2>
                    <p><label for="question-input">Search</label></p>
                    <textarea id="question-input" rows="10" cols="80"></textarea>
                    <p><button id="question-button" onclick="ask()">Ask</button></p>
                    <div id="question_output" class="box_with_border">
                        <div id="question_output_header">
                            <h3>Question:&nbsp;&nbsp;</h3>
                            <span id="question_output_question"></span>
                        </div>
                        <hr class="hr_separator" />
                        <div>
                            <h3>Answer:&nbsp;&nbsp;</h3>
                            <span id="question_output_answer"></span>
                        </div>
                    </div>
                </article>
            </div>

            <footer class="screen_footer">
                <p>
                    <a href="https://github.com/eldius/document-feeder" target="_blank">[eldius/document-feeder - GitHub]</a>
                </p>
            </footer>
        </div>
    </body>
</html>
